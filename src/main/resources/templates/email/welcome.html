<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #333333; }
        .content { color: #555555; line-height: 1.6; }
        .footer { margin-top: 40px; text-align: center; color: #aaaaaa; font-size: 12px; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>¡Bienvenido!</h1>
    </div>
    <div class="content">
        <p>Hola <strong th:text="${name ?: 'Usuario'}">Usuario</strong>,</p>
        <p>Tu cuenta ha sido creada exitosamente. Ya puedes acceder a nuestra plataforma.</p>
        <p th:if="${loginUrl}">
            <a th:href="${loginUrl}" class="btn">Iniciar sesión</a>
        </p>
        <p>Si tienes alguna pregunta, no dudes en contactarnos.</p>
    </div>
    <div class="footer">
        <p>&copy; 2025 BackAndWhite. Todos los derechos reservados.</p>
    </div>
</div>
</body>
</html>
